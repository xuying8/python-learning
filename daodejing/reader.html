<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全文阅读 — 道德经</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="mainNav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">道德经</a>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">&#9776;</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="ideas.html">核心思想</a></li>
      <li><a href="reader.html" style="color:var(--accent)">全文阅读</a></li>
    </ul>
  </div>
</nav>

<section style="padding-top:100px">
  <div class="section-inner">
    <div class="section-header">
      <div class="section-tag">ORIGINAL TEXT</div>
      <h2 class="section-title">全 文 阅 读</h2>
      <p class="section-desc">通行本八十一章 · 王弼注本</p>
    </div>

    <div class="reader-layout">
      <!-- Sidebar: chapter list (JS fills this) -->
      <div class="reader-sidebar" id="chapSidebar"></div>

      <!-- Main reading area -->
      <div class="reader-main">
        <div class="chapter-card">
          <div class="chapter-card-num" id="chapNum">第一章</div>
          <div class="chapter-card-text" id="chapText">加载中…</div>
          <div class="chapter-card-nav">
            <button class="btn" id="prevBtn">上一章</button>
            <button class="btn" id="nextBtn">下一章</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<footer>
  <a href="index.html" class="btn" style="margin-bottom:16px">返回首页</a><br>
  道德经 · 老子<br>
  天之道，利而不害；圣人之道，为而不争。
</footer>

<button class="scroll-top" id="scrollTop">&#8593;</button>

<script src="js/chapters.js"></script>
<script src="js/app.js"></script>
</body>
</html>
